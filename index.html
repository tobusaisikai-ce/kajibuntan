<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e8789a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おうち分担">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>おうち分担</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#fdf6f9;--surface:#fff;--s2:#fef0f5;--border:#f2d6e4;--border2:#f8e4ee;
  --pink:#e8789a;--pink-l:#fde8f0;--pink-b:#f5b8ce;
  --mint:#5bab8e;--mint-l:#e4f7f0;
  --lav:#9b7fd4;--lav-l:#f0eafc;
  --sky:#5aadd4;--sky-l:#e4f3fb;
  --pch:#e8956a;--pch-l:#fdf0e8;
  --text:#3d2c38;--muted:#9a7d8e;--dim:#c4a8b8;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}
.app-header{background:#fff;border-bottom:1.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(232,120,154,.10)}
.app-title{font-size:17px;font-weight:700}.app-title span{color:var(--pink)}
.tab-bar{display:grid;grid-template-columns:repeat(3,1fr);background:#fff;border-bottom:1.5px solid var(--border);position:sticky;top:53px;z-index:290;box-shadow:0 1px 6px rgba(232,120,154,.06)}
.tab-btn{font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1.5px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.tab-btn .ti{font-size:18px}.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:700}
.page{display:none;padding:14px;max-width:680px;margin:0 auto}.page.active{display:block}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(232,120,154,.06)}
.card-hdr{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.month-select{font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:700;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rs);padding:6px 14px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;color:var(--text)}
.unavail-section{margin-top:16px}.unavail-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
.umcal-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.umcal-hdr span{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:3px 0}
.umcal-hdr .sun{color:#e05070}.umcal-hdr .sat{color:var(--sky)}
.umcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.umcal-cell{aspect-ratio:1;border-radius:8px;border:1.5px solid transparent;background:var(--s2);font-size:11px;font-weight:700;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;user-select:none;gap:1px}
.umcal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.umcal-cell.today{border-color:var(--pink);color:var(--pink)}.umcal-cell.sun-cell{color:#e05070}.umcal-cell.sat-cell{color:var(--sky)}.umcal-cell.has-unavail{background:var(--pink-l)}.umcal-cell:not(.empty):hover{border-color:var(--border)}
.unavail-badges{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;width:100%}
.unavail-badge{font-size:8px;padding:0 2px;border-radius:3px;font-weight:700;line-height:1.4}
.assign-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:linear-gradient(135deg,#f090b0,#e8789a,#d45f88);color:#fff;border:none;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(232,120,154,.38);transition:all .2s}
.assign-btn:hover{transform:translateY(-2px)}.assign-btn:active{transform:scale(.98)}
.result-area{display:none}.result-area.visible{display:block}
.result-month-badge{display:inline-flex;align-items:center;gap:6px;background:var(--pink-l);color:var(--pink);border:1.5px solid var(--pink-b);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}.legend-dot{width:10px;height:10px;border-radius:50%}
/* 家事回数サマリー - スマホは1列、PCは2列 */
.chore-summary{margin-bottom:12px}.chore-summary-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
.chore-summary-grid{display:grid;grid-template-columns:1fr;gap:6px}
@media(min-width:540px){.chore-summary-grid{grid-template-columns:1fr 1fr}}
.chore-summary-row{background:var(--s2);border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.chore-summary-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.chore-summary-name span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chore-summary-counts{display:flex;gap:6px;flex-shrink:0}
.chore-count-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}
/* カレンダー（PC表示） */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-table{width:100%;border-collapse:separate;border-spacing:0;min-width:300px}
.cal-table thead th{font-size:11px;font-weight:700;color:var(--muted);padding:6px 2px;text-align:center;background:var(--s2);border-bottom:1.5px solid var(--border)}
.cal-table thead th.sun{color:#e05070}.cal-table thead th.sat{color:var(--sky)}
.cal-table thead th:first-child{border-radius:8px 0 0 0}.cal-table thead th:last-child{border-radius:0 8px 0 0}
.cal-table tbody td{vertical-align:top;border:1px solid var(--border2);padding:0;width:calc(100%/7)}
.cell-inner{min-height:72px;padding:4px 3px 5px;display:flex;flex-direction:column;gap:2px}
.cell-day{font-size:11px;font-weight:700;color:var(--muted);line-height:1;margin-bottom:1px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cell-day.today{background:var(--pink);color:#fff}.cell-day.sun{color:#e05070}.cell-day.sat{color:var(--sky)}
td.empty .cell-inner{background:var(--s2)}td.all-unavail .cell-inner{background:#fff5f8}
.chore-tag{font-size:9px;font-weight:700;border-radius:3px;padding:2px 3px;line-height:1.3;word-break:break-all;display:block}
.unavail-marker{font-size:8px;color:var(--dim);font-weight:700;text-align:center;line-height:1.2}
/* スマホでカレンダーを非表示→リスト表示 */
.cal-view{display:none}
.list-view{display:block}
@media(min-width:540px){.cal-view{display:block}.list-view{display:none}}
/* リスト表示（スマホ用） */
.list-members-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.list-member-col{border-radius:var(--rs);overflow:hidden;border:1.5px solid var(--border)}
.list-member-hdr{padding:8px 10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.list-day-row{display:flex;align-items:baseline;gap:6px;padding:5px 10px;border-top:1px solid var(--border2)}
.list-day-num{font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;width:22px}
.list-day-num.sun{color:#e05070}.list-day-num.sat{color:var(--sky)}
.list-day-chores{display:flex;flex-direction:column;gap:2px;flex:1}
.list-chore-item{font-size:11px;font-weight:700;padding:2px 5px;border-radius:4px;line-height:1.4}
/* アクションボタン */
.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.action-btn{flex:1;min-width:60px;padding:11px 6px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rs);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.action-btn .ab-icon{font-size:18px}.action-btn:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-l)}.action-btn:active{transform:scale(.96)}
/* PDFモーダル */
.pdf-modal-overlay{position:fixed;inset:0;background:rgba(61,44,56,.45);z-index:600;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px)}
.pdf-modal-overlay.show{opacity:1;pointer-events:all}
.pdf-modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
.pdf-modal-overlay.show .pdf-modal-sheet{transform:translateY(0)}
.pdf-modal-title{font-size:16px;font-weight:700;margin-bottom:6px}
.pdf-modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.pdf-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.pdf-choice-btn{padding:18px 12px;border:2px solid var(--border);border-radius:var(--r);background:var(--s2);font-family:inherit;cursor:pointer;text-align:center;transition:all .2s}
.pdf-choice-btn:hover,.pdf-choice-btn.selected{border-color:var(--pink);background:var(--pink-l)}
.pdf-choice-icon{font-size:28px;margin-bottom:6px}
.pdf-choice-label{font-size:13px;font-weight:700;color:var(--text)}
.pdf-choice-desc{font-size:11px;color:var(--muted);margin-top:3px}
.pdf-modal-cancel{width:100%;padding:12px;border:1.5px solid var(--border);background:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
/* PDF生成中 */
.pdf-loading{position:fixed;inset:0;background:rgba(61,44,56,.55);z-index:800;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(4px)}
.pdf-loading.show{display:flex}.pdf-loading-text{color:#fff;font-size:15px;font-weight:700}
.pdf-spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* 履歴 */
.page-title{font-size:18px;font-weight:700;margin-bottom:2px}.page-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.history-empty{text-align:center;padding:4rem 2rem;color:var(--dim);font-size:14px}.history-empty .he-icon{font-size:3rem;margin-bottom:.5rem}
.history-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(232,120,154,.05)}
.history-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1.5px solid transparent;cursor:pointer;user-select:none;transition:background .15s}
.history-card-hdr:hover{background:var(--s2)}.history-card.open .history-card-hdr{border-bottom-color:var(--border)}
.history-month{font-size:15px;font-weight:700}.history-meta{font-size:11px;color:var(--muted);margin-top:1px}
.history-toggle{font-size:12px;color:var(--dim);transition:transform .2s}.history-card.open .history-toggle{transform:rotate(180deg)}
.history-body{display:none;padding:12px 14px}.history-card.open .history-body{display:block}
.history-cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.history-action-row{display:flex;gap:8px}
.history-action-btn{flex:1;padding:10px 6px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--rs);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.history-action-btn:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-l)}
.history-del-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 6px;border:1.5px dashed var(--border);background:none;border-radius:var(--rs);font-family:inherit;font-size:12px;color:var(--dim);cursor:pointer;transition:all .15s}
.history-del-btn:hover{border-color:#e57878;color:#e57878;background:#fff5f5}
/* 設定 */
.settings-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.settings-section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.member-input-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.member-input-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.member-avatar-btn{width:38px;height:38px;flex-shrink:0;border-radius:50%;border:2px solid var(--border);background:var(--s2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.member-avatar-btn:hover{border-color:var(--pink)}
.member-color-btn{width:28px;height:28px;flex-shrink:0;border-radius:50%;border:3px solid rgba(255,255,255,.7);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .15s}
.member-color-btn:hover{transform:scale(1.12)}
.member-input{flex:1;min-width:0;font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--s2);color:var(--text);outline:none;transition:border-color .2s}
.member-input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(232,120,154,.12);background:#fff}
.remove-btn{flex-shrink:0;width:32px;height:32px;border:1.5px solid var(--border);background:none;border-radius:8px;cursor:pointer;font-size:13px;color:var(--dim);display:flex;align-items:center;justify-content:center;transition:all .15s}
.remove-btn:hover{border-color:#e57878;color:#e57878;background:#fff5f5}
.chore-settings-row{background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:12px;margin-bottom:8px}
.chore-row-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.chore-icon-btn{font-size:22px;width:38px;height:38px;flex-shrink:0;background:#fff;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chore-icon-btn:hover{border-color:var(--pink)}
.chore-name-input{flex:1;min-width:0;font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rs);background:#fff;color:var(--text);outline:none}
.chore-name-input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(232,120,154,.12)}
.freq-type-row{display:flex;gap:6px;margin-bottom:8px}
.freq-type-btn{flex:1;padding:7px 4px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.freq-type-btn.active{background:var(--pink-l);border-color:var(--pink);color:var(--pink)}
.freq-count-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.freq-count-chip{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.freq-count-chip.active{background:var(--pink-l);border-color:var(--pink);color:var(--pink)}
.day-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px}
.day-chips-row{display:flex;gap:5px;flex-wrap:wrap}
.day-chip{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.day-chip.active{background:var(--mint-l);border-color:var(--mint);color:var(--mint)}
.day-chip.sun-chip.active{background:#fff0f3;border-color:#e05070;color:#e05070}
.day-chip.sat-chip.active{background:var(--sky-l);border-color:var(--sky);color:var(--sky)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:1.5px dashed var(--border);background:none;border-radius:var(--rs);font-family:inherit;font-size:13px;color:var(--muted);cursor:pointer;margin-top:4px;transition:all .15s}
.add-btn:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-l)}
.save-settings-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:linear-gradient(135deg,#f090b0,#e8789a);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(232,120,154,.30);transition:all .2s}
.save-settings-btn:hover{transform:translateY(-2px)}.save-settings-btn:active{transform:scale(.98)}
/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(61,44,56,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px)}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:500px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.modal-member-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.modal-member-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--s2);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:13px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--s2);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s}
.modal-btn.primary{background:linear-gradient(135deg,#f090b0,#e8789a);color:#fff;border:none;box-shadow:0 3px 12px rgba(232,120,154,.35)}
.modal-btn.primary:hover{transform:translateY(-1px)}
/* 確認 */
.confirm-overlay{position:fixed;inset:0;background:rgba(61,44,56,.45);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);padding:20px}
.confirm-overlay.show{opacity:1;pointer-events:all}
.confirm-box{background:#fff;border-radius:20px;padding:24px 20px 20px;width:100%;max-width:360px;transform:scale(.88);transition:transform .25s cubic-bezier(.34,1.4,.64,1)}
.confirm-overlay.show .confirm-box{transform:scale(1)}
.confirm-icon{font-size:36px;text-align:center;margin-bottom:10px}.confirm-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:8px}
.confirm-body{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;margin-bottom:18px}
.confirm-btns{display:flex;gap:8px}
.confirm-btn{flex:1;padding:12px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--s2);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s}
.confirm-btn.ok{background:linear-gradient(135deg,#f090b0,#e8789a);color:#fff;border:none;box-shadow:0 3px 12px rgba(232,120,154,.35)}
/* 絵文字ピッカー */
.emoji-picker-overlay{position:fixed;inset:0;z-index:700;display:flex;align-items:flex-end;justify-content:center;background:rgba(61,44,56,.4);opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px)}
.emoji-picker-overlay.show{opacity:1;pointer-events:all}
.emoji-picker-sheet{background:#fff;border-radius:20px 20px 0 0;padding:16px 16px 32px;width:100%;max-width:500px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
.emoji-picker-overlay.show .emoji-picker-sheet{transform:translateY(0)}
.emoji-picker-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:12px}
.emoji-opt{font-size:24px;width:100%;aspect-ratio:1;border:none;background:var(--s2);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emoji-opt:active{transform:scale(.88)}

/* カラーパレット */
.color-palette{display:flex;flex-wrap:wrap;gap:10px;padding:14px;background:var(--s2);border-radius:var(--rs);margin-bottom:14px}
.color-swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.color-swatch:hover{transform:scale(1.12)}.color-swatch.selected{border-color:var(--text);transform:scale(1.1)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});}

/* ===== CONSTANTS ===== */
const DAYS_JA=['日','月','火','水','木','金','土'];
const AVATAR_EMOJIS=['🌸','🌿','🌙','⭐','🌼','🍀','🦋','🐣','🐰','🐱','🍓','🍋','🎀','💎','🔮'];
const CHORE_EMOJIS=['🍽️','🧹','🏠','👕','🛒','🍳','🪥','🛁','🚽','🗑️','🪟','🌱','👔','🧺','🧽','🪣','🫧','🛍️','🌀','💊','📦','🧴','🚿','🥢','🍱','☕'];
const COLOR_PALETTE=['#e8789a','#d45f88','#c44d9a','#9b7fd4','#7c5cbf','#5aadd4','#3d8fc4','#5bab8e','#3d9470','#e8956a','#d4774a','#e8c55a','#8a7050','#8a8a8a','#5a5a8a'];

/* ===== DEFAULTS ===== */
const DEFAULT_MEMBERS=[
  {name:'利空',avatar:'🌸',color:'#e8789a'},
  {name:'優希',avatar:'🌿',color:'#5bab8e'},
];
const DEFAULT_CHORES=[
  {name:'皿洗い',     icon:'🍽️',freqType:'daily',  freqCount:1,days:[]},
  {name:'床掃除',     icon:'🧹',freqType:'weekly', freqCount:1,days:[]},
  {name:'部屋掃除',   icon:'🏠',freqType:'weekly', freqCount:1,days:[]},
  {name:'洗濯（干す）',icon:'👕',freqType:'weekly', freqCount:2,days:[]},
  {name:'洗濯（畳む）',icon:'👕',freqType:'weekly', freqCount:2,days:[]},
  {name:'買い物',     icon:'🛒',freqType:'weekly', freqCount:2,days:[]},
  {name:'料理',       icon:'🍳',freqType:'daily',  freqCount:1,days:[]},
  {name:'洗面所掃除', icon:'🪥',freqType:'monthly',freqCount:1,days:[]},
  {name:'風呂掃除',   icon:'🛁',freqType:'weekly', freqCount:1,days:[]},
  {name:'トイレ掃除', icon:'🚽',freqType:'monthly',freqCount:1,days:[]},
];

/* ===== STATE ===== */
// 旧フォーマット（文字列配列）を新フォーマット（オブジェクト配列）に変換
function normalizeMember(m,i){
  if(typeof m==='string')return{name:m,avatar:AVATAR_EMOJIS[i%AVATAR_EMOJIS.length],color:COLOR_PALETTE[i%5]};
  return{name:m.name||'',avatar:m.avatar||AVATAR_EMOJIS[i%AVATAR_EMOJIS.length],color:m.color||COLOR_PALETTE[i%5]};
}
// LocalStorage読み込み（oc_members と oc_members2 両方確認して統合）
function loadMembers(){
  const raw=localStorage.getItem('oc_members2')||localStorage.getItem('oc_members')||'null';
  const parsed=JSON.parse(raw);
  if(!parsed)return DEFAULT_MEMBERS.map(m=>({...m}));
  return parsed.map((m,i)=>normalizeMember(m,i));
}

let members    =loadMembers();
let chores     =JSON.parse(localStorage.getItem('oc_chores') ||'null')||DEFAULT_CHORES.map(c=>({...c}));
let history    =JSON.parse(localStorage.getItem('oc_history')||'[]');
let unavailDays=JSON.parse(localStorage.getItem('oc_unavail')||'{}');
let lastResult =null, pendingResult=null;
let modalDay=null, modalSelMembers=new Set();
let emojiTargetBtn=null, emojiTargetType='chore';
let colorTargetIdx=null, colorSelected=null;

// 履歴の古いメンバーも正規化
history=history.map(h=>({...h,members:(h.members||[]).map((m,i)=>normalizeMember(m,i))}));

(function init(){buildMonthSelect();renderSettings();renderHistory();renderUnavailCal();})();

/* ===== MONTH ===== */
function buildMonthSelect(){
  const sel=document.getElementById('monthSelect');sel.innerHTML='';
  const now=new Date();
  for(let i=-1;i<=6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const y=d.getFullYear(),m=d.getMonth()+1;
    const opt=document.createElement('option');
    opt.value=`${y}-${String(m).padStart(2,'0')}`;opt.textContent=`${y}年${m}月`;
    if(i===0)opt.selected=true;sel.appendChild(opt);
  }
}
function getMonthKey(){return document.getElementById('monthSelect').value;}
function onMonthChange(){renderUnavailCal();document.getElementById('resultArea').classList.remove('visible');lastResult=null;}

/* ===== UNAVAIL CAL ===== */
function getUnavailForMonth(key){return unavailDays[key||getMonthKey()]||{};}
function renderUnavailCal(){
  const[y,m]=getMonthKey().split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay(),lastDate=new Date(y,m,0).getDate();
  const today=new Date(),ud=getUnavailForMonth();
  const grid=document.getElementById('unavailGrid');grid.innerHTML='';
  for(let i=0;i<firstDay;i++){const c=document.createElement('div');c.className='umcal-cell empty';grid.appendChild(c);}
  for(let d=1;d<=lastDate;d++){
    const dow=(firstDay+d-1)%7;
    const isToday=(y===today.getFullYear()&&m===today.getMonth()+1&&d===today.getDate());
    const hasSel=ud[d]&&ud[d].length>0;
    const cell=document.createElement('div');
    cell.className='umcal-cell'+(dow===0?' sun-cell':dow===6?' sat-cell':'')+(isToday?' today':'')+(hasSel?' has-unavail':'');
    cell.innerHTML=`<span style="font-size:11px;font-weight:700">${d}</span>`;
    if(hasSel){
      const bw=document.createElement('div');bw.className='unavail-badges';
      ud[d].forEach(mi=>{
        const mem=members[mi];if(!mem)return;
        const b=document.createElement('span');b.className='unavail-badge';
        b.style.cssText=`background:${hexAlpha(mem.color,.2)};color:${mem.color}`;
        b.textContent=mem.name.charAt(0);bw.appendChild(b);
      });
      cell.appendChild(bw);
    }
    cell.addEventListener('click',()=>openUnavailModal(d));grid.appendChild(cell);
  }
}

/* ===== UNAVAIL MODAL ===== */
function openUnavailModal(day){
  modalDay=day;const[,m]=getMonthKey().split('-').map(Number);
  document.getElementById('modalDateLabel').textContent=`${m}月${day}日`;
  modalSelMembers=new Set(getUnavailForMonth()[day]||[]);
  renderModalChips();document.getElementById('unavailModal').classList.add('show');
}
function closeModal(){document.getElementById('unavailModal').classList.remove('show');modalDay=null;}
function closeModalOutside(e){if(e.target===document.getElementById('unavailModal'))closeModal();}
function renderModalChips(){
  const grid=document.getElementById('modalMemberGrid');grid.innerHTML='';
  members.forEach((mem,i)=>{
    const sel=modalSelMembers.has(i);
    const chip=document.createElement('button');chip.className='modal-member-chip';
    if(sel){chip.style.cssText=`background:${hexAlpha(mem.color,.15)};border-color:${mem.color};color:${mem.color}`;}
    chip.innerHTML=`<span>${sel?'✓':''}</span>${mem.avatar} ${esc(mem.name)}`;
    chip.onclick=()=>{if(modalSelMembers.has(i))modalSelMembers.delete(i);else modalSelMembers.add(i);renderModalChips();};
    grid.appendChild(chip);
  });
}
function confirmDayUnavail(){
  if(!modalDay)return;const key=getMonthKey();
  if(!unavailDays[key])unavailDays[key]={};
  if(modalSelMembers.size===0)delete unavailDays[key][modalDay];
  else unavailDays[key][modalDay]=[...modalSelMembers].sort();
  localStorage.setItem('oc_unavail',JSON.stringify(unavailDays));closeModal();renderUnavailCal();
}
function clearDayUnavail(){
  if(!modalDay)return;const key=getMonthKey();
  if(unavailDays[key])delete unavailDays[key][modalDay];
  localStorage.setItem('oc_unavail',JSON.stringify(unavailDays));closeModal();renderUnavailCal();
}

/* ===== ASSIGN ===== */
function assign(){
  if(members.length<2){showToast('⚠️ メンバーが2人以上必要です');return;}
  if(chores.length===0){showToast('⚠️ 家事を追加してください');return;}
  const[y,m]=getMonthKey().split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay(),lastDate=new Date(y,m,0).getDate();
  const ud=getUnavailForMonth();
  const result=generateAssignment(chores,members,firstDay,lastDate,ud);
  // 警告：週N回でどの週にも1回も入らなかった家事（daily/monthlyは除外）
  const warnings=[];
  chores.forEach((chore,ci)=>{
    if(chore.freqType==='daily'||chore.freqType==='monthly')return;
    const weeks=getWeeks(firstDay,lastDate);
    let missing=0;
    weeks.forEach(wk=>{if(!result.some(r=>r.choreIdx===ci&&wk.includes(r.date)))missing++;});
    if(missing>0)warnings.push(`「${chore.name}」入りきらない週が${missing}週あるよ`);
  });
  if(warnings.length>0){
    pendingResult=result;
    document.getElementById('confirmBody').innerHTML=[...new Set(warnings)].map(w=>`・${w}`).join('<br>');
    document.getElementById('confirmOverlay').classList.add('show');
  }else{lastResult=result;renderCalendar();}
}

/* ===== CORE LOGIC =====
  Step1: 各家事ごとに独立して月間均等振り分け（差1以内を保証）
  Step2: 同じ日に1人へ集中している場合、月間均等を崩さない範囲で入れ替え
*/
function generateAssignment(chores,members,firstDay,lastDate,ud){
  const n=members.length;
  const result=[];

  // Step1: 家事ごとに独立して均等振り分け
  chores.forEach((chore,ci)=>{
    const dates=pickDatesForChore(chore,firstDay,lastDate,ud);
    if(!dates.length)return;

    // シャッフルでランダム性
    const shuffled=[...dates].sort(()=>Math.random()-.5);
    const total=shuffled.length;
    const base=Math.floor(total/n);
    const extra=total%n;

    // 各メンバーの割り当て枠を計算
    // 端数はランダムに誰かが1つ多く持つ
    const quota=Array(n).fill(base);
    if(extra>0){
      // 端数担当をランダムに選ぶ
      const extraIdx=Math.floor(Math.random()*n);
      quota[extraIdx]+=extra;
    }

    // 不可日を考慮しながら枠に従って割り当て
    const memberLoad=Array(n).fill(0);
    shuffled.forEach(date=>{
      // 不可でないメンバーの中で、まだ枠が余っている人を優先
      let bestIdx=-1,bestPriority=-Infinity;
      for(let i=0;i<n;i++){
        const isUnavail=(ud[date]||[]).includes(i);
        if(isUnavail)continue;
        const remaining=quota[i]-memberLoad[i];
        const priority=remaining*1000 - memberLoad[i]; // 残り枠多い人優先、同じなら担当少ない人優先
        if(priority>bestPriority){bestPriority=priority;bestIdx=i;}
      }
      if(bestIdx===-1){
        // 全員不可なら枠関係なく最少担当者
        let minLoad=Infinity;
        for(let i=0;i<n;i++){if(memberLoad[i]<minLoad){minLoad=memberLoad[i];bestIdx=i;}}
      }
      result.push({date,choreIdx:ci,memberIdx:bestIdx});
      memberLoad[bestIdx]++;
    });
  });

  // Step2: 日内均等化（月間均等を崩さない入れ替え）
  // 同じ日のスロットを集め、1人に偏っていたら別の家事の担当者と入れ替えを試みる
  const byDate={};
  result.forEach((r,idx)=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(idx);});

  Object.keys(byDate).map(Number).sort((a,b)=>a-b).forEach(date=>{
    const idxs=byDate[date];
    if(idxs.length<2)return;

    // 各メンバーの担当数を集計
    const dayCount=()=>{
      const c=Array(n).fill(0);
      idxs.forEach(i=>c[result[i].memberIdx]++);
      return c;
    };

    // 最大10回試みて日内を均等化
    for(let attempt=0;attempt<10;attempt++){
      const cnt=dayCount();
      const maxCnt=Math.max(...cnt),minCnt=Math.min(...cnt);
      if(maxCnt-minCnt<=1)break; // 差が1以内なら終了

      const maxMember=cnt.indexOf(maxCnt);
      const minMember=cnt.indexOf(minCnt);

      // maxMemberの家事の中からminMemberと入れ替えできるものを探す
      // 入れ替え条件：月間均等が壊れないこと（その家事でmaxMemberとminMemberの差が2以上ある場合のみ）
      let swapped=false;
      for(const i of idxs){
        if(result[i].memberIdx!==maxMember)continue;
        const ci=result[i].choreIdx;
        // この家事でmaxMemberとminMemberの月間カウントを確認
        const choreCountMax=result.filter(r=>r.choreIdx===ci&&r.memberIdx===maxMember).length;
        const choreCountMin=result.filter(r=>r.choreIdx===ci&&r.memberIdx===minMember).length;
        // 入れ替えても月間均等が保たれる（差が2以上あるとき入れ替えで差が1縮まる）
        if(choreCountMax-choreCountMin>=1&&!(ud[date]||[]).includes(minMember)){
          result[i].memberIdx=minMember;
          swapped=true;
          break;
        }
      }
      if(!swapped)break;
    }
  });

  return result;
}

function pickDatesForChore(chore,firstDay,lastDate,ud){
  const{freqType,freqCount,days}=chore;
  const hasDay=days&&days.length>0;
  function isAllUnavail(d){return(ud[d]||[]).length>=members.length;}
  if(freqType==='daily'){
    const arr=[];for(let d=1;d<=lastDate;d++){if(!isAllUnavail(d))arr.push(d);}return arr;
  }
  if(freqType==='monthly'){
    const c=[];
    for(let d=1;d<=lastDate;d++){
      if(isAllUnavail(d))continue;
      if(hasDay&&!days.includes((firstDay+d-1)%7))continue;
      c.push(d);
    }
    return pickEvenly(c,freqCount);
  }
  const weeks=getWeeks(firstDay,lastDate),dates=[];
  weeks.forEach(wk=>{
    const c=wk.filter(d=>{
      if(isAllUnavail(d))return false;
      if(hasDay&&!days.includes((firstDay+d-1)%7))return false;
      return true;
    });
    dates.push(...pickEvenly(c,freqCount));
  });
  return[...new Set(dates)].sort((a,b)=>a-b);
}
function pickEvenly(cands,count){
  if(!cands.length)return[];if(cands.length<=count)return[...cands];
  const step=cands.length/count,r=[];
  for(let i=0;i<count;i++)r.push(cands[Math.min(Math.floor(i*step),cands.length-1)]);
  return[...new Set(r)].sort((a,b)=>a-b);
}
function getWeeks(firstDay,lastDate){
  const ws=[];let w=[];
  for(let d=1;d<=lastDate;d++){const dow=(firstDay+d-1)%7;if(dow===0&&w.length>0){ws.push(w);w=[];}w.push(d);}
  if(w.length>0)ws.push(w);return ws;
}

/* ===== CALENDAR TABLE ===== */
function buildCalendarTable(result,usedChores,usedMembers,monthKey,ud){
  const[y,m]=monthKey.split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay(),lastDate=new Date(y,m,0).getDate();
  const today=new Date();
  const table=document.createElement('table');table.className='cal-table';
  const thead=document.createElement('thead');
  thead.innerHTML='<tr>'+DAYS_JA.map((d,i)=>`<th class="${i===0?'sun':i===6?'sat':''}">${d}</th>`).join('')+'</tr>';
  table.appendChild(thead);
  const tbody=document.createElement('tbody');let row=null,col=0;
  if(firstDay>0){
    row=document.createElement('tr');
    for(let i=0;i<firstDay;i++){const td=document.createElement('td');td.className='empty';td.innerHTML='<div class="cell-inner"></div>';row.appendChild(td);}
    col=firstDay;
  }
  for(let d=1;d<=lastDate;d++){
    if(!row||col===0)row=document.createElement('tr');
    const dow=(firstDay+d-1)%7;
    const isToday=(y===today.getFullYear()&&m===today.getMonth()+1&&d===today.getDate());
    const dayUnavail=ud[d]||[];const allUnavail=dayUnavail.length>=usedMembers.length;
    const td=document.createElement('td');if(allUnavail)td.className='all-unavail';
    const dayCls='cell-day'+(isToday?' today':dow===0?' sun':dow===6?' sat':'');
    const inner=document.createElement('div');inner.className='cell-inner';
    inner.innerHTML=`<div class="${dayCls}">${d}</div>`;
    result.filter(r=>r.date===d).sort((a,b)=>a.choreIdx-b.choreIdx).forEach(slot=>{
      const chore=usedChores[slot.choreIdx];const mem=usedMembers[slot.memberIdx];if(!chore||!mem)return;
      const tag=document.createElement('span');tag.className='chore-tag';
      tag.style.cssText=`background:${hexAlpha(mem.color,.15)};color:${mem.color}`;
      tag.textContent=`${chore.icon||'✨'}${esc(chore.name)}`;inner.appendChild(tag);
    });
    if(allUnavail){const mk=document.createElement('div');mk.className='unavail-marker';mk.textContent='全員お休み 🌸';inner.appendChild(mk);}
    td.appendChild(inner);row.appendChild(td);col++;
    if(col===7){tbody.appendChild(row);row=null;col=0;}
  }
  if(row){while(col<7){const td=document.createElement('td');td.className='empty';td.innerHTML='<div class="cell-inner"></div>';row.appendChild(td);col++;}tbody.appendChild(row);}
  table.appendChild(tbody);return table;
}

async function generateListPDF(histIdx){
  let pdfResult,pdfChores,pdfMembers,pdfKey,pdfUd;

  try{
    const{jsPDF}=window.jspdf;
    // A4縦
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297,M=10,CW=W-M*2;
    let curY=M;

    const hexRGB=(hex)=>{const h=(hex||'#888888').replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
    const setFill=(hex)=>{const[r,g,b]=hexRGB(hex);pdf.setFillColor(r,g,b);};
    const setDraw=(hex)=>{const[r,g,b]=hexRGB(hex);pdf.setDrawColor(r,g,b);};
    const setFillAlpha=(hex,a)=>{const[r,g,b]=hexRGB(hex);pdf.setFillColor(Math.round(r*a+255*(1-a)),Math.round(g*a+255*(1-a)),Math.round(b*a+255*(1-a)));};

    const jpText=async(text,x,fy,size=10,color='#3d2c38',align='left',maxW=null)=>{
      if(!text)return;
      const canvas=document.createElement('canvas');
      const scale=3,fs=size*scale;
      canvas.height=Math.ceil(fs*1.6);
      const ctx=canvas.getContext('2d');
      ctx.font=`700 ${fs}px "Noto Sans JP",sans-serif`;
      const tw=ctx.measureText(String(text)).width;
      const maxPx=maxW?maxW*3.78*scale:CW*3.78*scale;
      canvas.width=Math.min(Math.ceil(tw)+8,maxPx);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.font=`700 ${fs}px "Noto Sans JP",sans-serif`;
      const[r,g,b]=hexRGB(color);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.textBaseline='top';
      let dx=2;
      if(align==='right'){ctx.textAlign='right';dx=canvas.width-2;}
      else if(align==='center'){ctx.textAlign='center';dx=canvas.width/2;}
      ctx.fillText(String(text),dx,2);
      const pW=canvas.width/scale/3.78,pH=canvas.height/scale/3.78;
      let px=x;if(align==='right')px=x-pW;else if(align==='center')px=x-pW/2;
      pdf.addImage(canvas.toDataURL('image/png'),'PNG',px,fy,pW,pH);
    };

    // ===== ヘッダー =====
    setFill('#fde8f0');pdf.rect(M,curY,CW,12,'F');
    await jpText(`🏠 おうち分担　${pdfLabel}　担当リスト`,M+3,curY+2,13,'#e8789a');
    curY+=15;

    // ===== テーブルレイアウト計算 =====
    const n=pdfMembers.length;
    const dateColW=18;           // 日付列幅
    const memberColW=(CW-dateColW-1)/n; // メンバー列幅（均等）
    const itemH=7;               // 家事1件の行高さ
    const minRowH=8;             // 最低行高さ
    const dateX=M;
    const memberXs=pdfMembers.map((_,i)=>M+dateColW+1+i*memberColW);

    // メンバーごとの日付→家事マップ
    const memberDays=pdfMembers.map(()=>({}));
    pdfResult.forEach(r=>{
      if(!memberDays[r.memberIdx][r.date])memberDays[r.memberIdx][r.date]=[];

    });

    setDraw('#f2d6e4');pdf.setLineWidth(0.3);pdf.rect(dateX,curY,dateColW,hdrH);
    await jpText('日付',dateX+1,curY+2.5,7,'#9a7d8e','center');
    // メンバー列ヘッダー
    for(let mi=0;mi<n;mi++){

      await jpText(`${mem.avatar} ${mem.name}`,mx+memberColW/2,curY+2,10,mem.color,'center',memberColW);
    }
    curY+=hdrH;

    // ===== 日付ごとの行 =====
    for(let d=1;d<=lastDate;d++){
      const hasAny=pdfMembers.some((_,mi)=>memberDays[mi][d]&&memberDays[mi][d].length>0);
      if(!hasAny)continue;

      // この行の高さ = 最多の家事件数 × itemH、最低minRowH
      const maxChores=Math.max(...pdfMembers.map((_,mi)=>(memberDays[mi][d]||[]).length));
      const rowH=Math.max(minRowH,maxChores*itemH);

      // ページオーバーチェック
      if(curY+rowH>H-M){
        pdf.addPage();curY=M;
        // ページ先頭にヘッダー再描画
        setFill('#fde8f0');pdf.rect(M,curY,CW,8,'F');
        await jpText(`${pdfLabel} 担当リスト（続き）`,M+3,curY+1.5,10,'#e8789a');

        // メンバーヘッダー再描画

        setDraw('#f2d6e4');pdf.rect(dateX,curY,dateColW,hdrH);
        for(let mi=0;mi<n;mi++){
          const mem=pdfMembers[mi];const mx=memberXs[mi];
          setFillAlpha(mem.color,0.15);pdf.rect(mx,curY,memberColW,hdrH,'F');
          setDraw('#f2d6e4');pdf.rect(mx,curY,memberColW,hdrH);
          await jpText(`${mem.avatar} ${mem.name}`,mx+memberColW/2,curY+2,10,mem.color,'center',memberColW);
        }
        curY+=hdrH;
      }

      const dow=(firstDay+d-1)%7;
      const isSun=dow===0,isSat=dow===6;
      const dayColor=isSun?'#e05070':isSat?'#5aadd4':'#3d2c38';

      // 日付セル
      setFill('#fef0f5');pdf.rect(dateX,curY,dateColW,rowH,'F');
      setDraw('#f2d6e4');pdf.setLineWidth(0.3);pdf.rect(dateX,curY,dateColW,rowH);
      await jpText(String(d),dateX+dateColW/2,curY+1.5,11,dayColor,'center');
      await jpText(DAYS_JA[dow],dateX+dateColW/2,curY+7,7,dayColor,'center');

      // メンバーセル（同じY・同じ高さで揃う）
      for(let mi=0;mi<n;mi++){
        const mem=pdfMembers[mi];const mx=memberXs[mi];
        setFill('#ffffff');pdf.rect(mx,curY,memberColW,rowH,'F');
        setDraw('#f2d6e4');pdf.rect(mx,curY,memberColW,rowH);
        const dayChores=memberDays[mi][d]||[];
        let ty=curY+1.5;
        for(const c of dayChores){
          setFillAlpha(mem.color,0.18);
          pdf.roundedRect(mx+1.5,ty,memberColW-3,itemH-1.5,1,1,'F');
          await jpText(`${c.icon||'✨'}${c.name}`,mx+3,ty+0.5,9,mem.color,'left',memberColW-5);
          ty+=itemH;
        }
      }
      curY+=rowH;
    }

    pdf.save(`おうち分担_${pdfLabel}_リスト.pdf`);showToast('✅ PDF生成完了！');
  }catch(e){console.error(e);showToast('❌ PDF生成に失敗しました');}
  document.getElementById('pdfLoading').classList.remove('show');
}

      setFill(mem.color);pdf.circle(lx+4,circleY,3.5,'F');
      // テキストも縦中央（circle中心から上下にずらす）
      await jpText(`${mem.avatar} ${mem.name}`,lx+10,y+(hdrH-6)/2,13,mem.color);
      lx+=legendItemW;
    }
    y+=hdrH+3;

    // ===== 家事回数サマリー =====
    const counts=pdfChores.map(()=>Array(pdfMembers.length).fill(0));
    pdfResult.forEach(r=>{if(counts[r.choreIdx])counts[r.choreIdx][r.memberIdx]++;});
    // 列数: 家事が8以下なら2列、9以上なら4列
    const cols=pdfChores.length<=8?2:4;
    const summaryRowH=10,summaryRows=Math.ceil(pdfChores.length/cols);
    const summaryTotalH=summaryRowH*summaryRows+9;
    setFill('#fef0f5');pdf.rect(M,y,CW,summaryTotalH,'F');
    await jpText('📊 家事別担当回数',M+2,y+2,9,'#9a7d8e');y+=8;
    const colW=CW/cols;
    // 各列内のレイアウトを固定座標で管理
    const badgeW=21; // バッジ1個の幅
    const badgeTotalW=pdfMembers.length*(badgeW+2); // バッジエリア合計幅
    const nameAreaW=colW-badgeTotalW-4; // 家事名エリア幅（残り）
    for(let ci=0;ci<pdfChores.length;ci++){
      const c=pdfChores[ci];
      const col=ci%cols;
      const rowOff=Math.floor(ci/cols);
      const cx=M+col*colW; // このセルの左端X
      const cy=y+rowOff*summaryRowH;
      // 区切り線
      setDraw('#f2d6e4');pdf.setLineWidth(0.2);
      if(rowOff>0)pdf.line(cx,cy,cx+colW,cy);
      // 家事名（左から固定幅）
      await jpText(`${c.icon||'✨'}${c.name}`,cx+2,cy+2,8,'#3d2c38');
      // バッジ（右端から逆算して固定位置）
      const bxStart=cx+colW-badgeTotalW-1;
      for(let mi=0;mi<pdfMembers.length;mi++){
        const mem=pdfMembers[mi];
        const bx=bxStart+mi*(badgeW+2);
        setFillAlpha(mem.color,0.2);pdf.roundedRect(bx,cy+1.5,badgeW,6.5,1.5,1.5,'F');
        await jpText(`${mem.avatar}${counts[ci][mi]}回`,bx+badgeW/2,cy+2.2,7,mem.color,'center');
      }
    }
    y+=summaryTotalH;

    // ===== カレンダー =====
    const firstDay=new Date(py,pm-1,1).getDay(),lastDate=new Date(py,pm,0).getDate();
    const today=new Date();
    const totalCells=firstDay+lastDate;const rows=Math.ceil(totalCells/7);
    const calH=H-y-M;const rowH=calH/rows;const cellW=CW/7;

    // 曜日ヘッダー
    const DAY_COLORS=['#e05070','#3d2c38','#3d2c38','#3d2c38','#3d2c38','#3d2c38','#5aadd4'];
    setFill('#fef0f5');pdf.rect(M,y,CW,8,'F');
    for(let i=0;i<7;i++)await jpText(DAYS_JA[i],M+i*cellW+cellW/2,y+1,10,DAY_COLORS[i],'center');
    y+=8;

    // グリッド線
    setDraw('#f2d6e4');pdf.setLineWidth(0.3);
    for(let r=0;r<=rows;r++)pdf.line(M,y+r*rowH,M+CW,y+r*rowH);
    for(let c=0;c<=7;c++)pdf.line(M+c*cellW,y,M+c*cellW,y+rows*rowH);

    // イベントマップ
    const evMap={};pdfResult.forEach(r=>{if(!evMap[r.date])evMap[r.date]=[];evMap[r.date].push(r);});

    // 1セルあたりのタグの高さ（文字サイズに合わせて調整）
    const tagH=rowH>30?5.5:rowH>22?5:4.5;
    const dayNumSize=rowH>30?10:rowH>22?9:8;
    const tagFontSize=rowH>30?7.5:rowH>22?7:6.5;
    const dayNumH=rowH>30?8:rowH>22?7:6;

    for(let d=1;d<=lastDate;d++){
      const ci2=(firstDay+d-1)%7;const ri=(firstDay+d-1)/7|0;
      const cx=M+ci2*cellW,cy=y+ri*rowH;
      const dow=(firstDay+d-1)%7;
      const isToday=(py===today.getFullYear()&&pm===today.getMonth()+1&&d===today.getDate());
      if(isToday){setFill('#fde8f0');pdf.rect(cx+0.3,cy+0.3,cellW-0.6,rowH-0.6,'F');}
      const dayColor=isToday?'#e8789a':dow===0?'#e05070':dow===6?'#5aadd4':'#9a7d8e';
      await jpText(String(d),cx+1.5,cy+0.8,dayNumSize,dayColor);
      const evs=(evMap[d]||[]).sort((a,b)=>a.choreIdx-b.choreIdx);
      let ty=cy+dayNumH;
      for(const slot of evs){
        if(ty+tagH>cy+rowH-0.5)break;
        const chore=pdfChores[slot.choreIdx];const mem=pdfMembers[slot.memberIdx];if(!chore||!mem)continue;
        setFillAlpha(mem.color,0.18);
        pdf.roundedRect(cx+0.5,ty,cellW-1,tagH-0.5,1,1,'F');
        await jpText(`${chore.icon||'✨'}${chore.name}`,cx+1.5,ty+0.4,tagFontSize,mem.color);
        ty+=tagH;
      }
    }
    pdf.save(`おうち分担_${pdfLabel}.pdf`);showToast('✅ PDF生成完了！');
  }catch(e){console.error(e);showToast('❌ PDF生成に失敗しました');}
  document.getElementById('pdfLoading').classList.remove('show');
}

/* ===== COPY ===== */
function copyResult(){
  if(!lastResult)return;
  const[y,m]=getMonthKey().split('-').map(Number);
  const byMember=members.map(()=>[]);
  lastResult.forEach(r=>{const c=chores[r.choreIdx];if(c)byMember[r.memberIdx].push(`${r.date}日 ${c.icon}${c.name}`);});
  let text=`【${y}年${m}月 家事分担】\n\n`;
  members.forEach((mem,i)=>{text+=`▶ ${mem.name}\n`;byMember[i].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(s=>text+=`  ${s}\n`);text+='\n';});
  navigator.clipboard.writeText(text).then(()=>showToast('📋 コピーしました')).catch(()=>showToast('⚠️ コピー失敗'));
}

/* ===== SAVE ===== */
function saveResult(){
  if(!lastResult)return;
  const key=getMonthKey();
  history=history.filter(h=>h.month!==key);
  history.unshift({month:key,result:lastResult,chores:JSON.parse(JSON.stringify(chores)),members:JSON.parse(JSON.stringify(members)),ud:JSON.parse(JSON.stringify(getUnavailForMonth())),savedAt:new Date().toLocaleString('ja-JP')});
  localStorage.setItem('oc_history',JSON.stringify(history));renderHistory();showToast('💾 履歴に保存しました');
}

/* ===== HISTORY ===== */
function renderHistory(){
  const el=document.getElementById('historyList');
  if(history.length===0){el.innerHTML='<div class="history-empty"><div class="he-icon">📭</div><div>まだ保存された履歴がありません</div></div>';return;}
  el.innerHTML='';
  history.forEach((h,i)=>{
    const[y,m]=h.month.split('-');const label=`${y}年${parseInt(m)}月`;
    const hM=(h.members||members).map((mm,ii)=>normalizeMember(mm,ii));
    const hC=h.chores||chores;const hU=h.ud||{};
    const card=document.createElement('div');card.className='history-card';
    const legendHTML=hM.map(b=>`<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div><span>${b.avatar} ${esc(b.name)}</span></div>`).join('');
    card.innerHTML=`
      <div class="history-card-hdr" onclick="this.parentElement.classList.toggle('open')">
        <div><div class="history-month">📅 ${label}</div><div class="history-meta">保存日時：${h.savedAt}</div></div>
        <span class="history-toggle">▾</span>
      </div>
      <div class="history-body">
        <div class="legend" style="margin-bottom:8px">${legendHTML}</div>
        <div class="chore-summary" id="hsummary-${i}"></div>
        <div class="history-cal-wrap" id="hcal-${i}"></div>
        <div class="history-action-row" style="margin-top:10px">
          <button class="history-action-btn" onclick="openPdfModal(${i})">🖨️ PDF出力</button>
          <button class="history-del-btn" onclick="deleteHistory(${i})">🗑 削除</button>
        </div>
      </div>`;
    // カレンダーと回数は展開時に遅延生成
    card.querySelector('.history-card-hdr').addEventListener('click',()=>{
      const calEl=document.getElementById(`hcal-${i}`);
      const listEl=document.getElementById(`hlist-${i}`);
      const sumEl=document.getElementById(`hsummary-${i}`);
      if(calEl&&!calEl.hasChildNodes()){
        // PC：カレンダー
        const calWrapEl=document.createElement('div');calWrapEl.className='cal-view history-cal-wrap';
        calWrapEl.appendChild(buildCalendarTable(h.result,hC,hM,h.month,hU));
        calEl.appendChild(calWrapEl);
        // スマホ：リスト
        const listWrapEl=document.createElement('div');listWrapEl.className='list-view';
        buildListView(h.result,hC,hM,h.month,hU,listWrapEl);
        calEl.appendChild(listWrapEl);
        buildChoreSummary(h.result,hC,hM,sumEl);
      }
    });
    el.appendChild(card);
  });
}
function deleteHistory(i){history.splice(i,1);localStorage.setItem('oc_history',JSON.stringify(history));renderHistory();showToast('🗑 削除しました');}

/* ===== SETTINGS ===== */
function renderSettings(){
  const mi=document.getElementById('memberInputs');mi.innerHTML='';
  members.forEach((mem,i)=>{
    const row=document.createElement('div');row.className='member-input-row';
    const avatarBtn=document.createElement('button');avatarBtn.className='member-avatar-btn';avatarBtn.textContent=mem.avatar;
    avatarBtn.onclick=()=>openEmojiPicker(avatarBtn,'avatar');
    const colorBtn=document.createElement('button');colorBtn.className='member-color-btn';colorBtn.style.background=mem.color;
    colorBtn.onclick=()=>openColorPicker(i);
    const nameInput=document.createElement('input');nameInput.className='member-input';nameInput.type='text';nameInput.value=mem.name;nameInput.placeholder='名前';
    const removeBtn=document.createElement('button');removeBtn.className='remove-btn';removeBtn.textContent='✕';removeBtn.onclick=()=>removeMember(i);
    row.appendChild(avatarBtn);row.appendChild(colorBtn);row.appendChild(nameInput);row.appendChild(removeBtn);
    mi.appendChild(row);
  });
  const ci=document.getElementById('choreInputs');ci.innerHTML='';
  chores.forEach((c,i)=>ci.appendChild(buildChoreRow(c,i)));
}
function buildChoreRow(c,i){
  const row=document.createElement('div');row.className='chore-settings-row';
  const ft=c.freqType||'weekly',fc=c.freqCount||1,cd=c.days||[];
  const top=document.createElement('div');top.className='chore-row-top';
  const iconBtn=document.createElement('button');iconBtn.className='chore-icon-btn';iconBtn.textContent=c.icon||'✨';
  iconBtn.onclick=()=>openEmojiPicker(iconBtn,'chore');top.appendChild(iconBtn);
  const nameInput=document.createElement('input');nameInput.className='chore-name-input';nameInput.type='text';nameInput.value=c.name;nameInput.placeholder='家事名';top.appendChild(nameInput);
  const removeBtn=document.createElement('button');removeBtn.className='remove-btn';removeBtn.textContent='✕';removeBtn.onclick=()=>removeChore(i);top.appendChild(removeBtn);
  row.appendChild(top);
  const typeRow=document.createElement('div');typeRow.className='freq-type-row';
  ['monthly','weekly','daily'].forEach(type=>{
    const btn=document.createElement('button');btn.className='freq-type-btn'+(ft===type?' active':'');
    btn.textContent=type==='monthly'?'月':type==='weekly'?'週':'毎日';
    btn.onclick=()=>{row.querySelectorAll('.freq-type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateFreqUI(row,type,fc,cd);};
    typeRow.appendChild(btn);
  });
  row.appendChild(typeRow);
  const extra=document.createElement('div');extra.className='freq-extra';row.appendChild(extra);
  updateFreqUI(row,ft,fc,cd);return row;
}
function updateFreqUI(row,ft,fc,days){
  const extra=row.querySelector('.freq-extra');extra.innerHTML='';if(ft==='daily')return;
  const maxC=ft==='monthly'?4:7;
  const cr=document.createElement('div');cr.className='freq-count-row';
  for(let n=1;n<=maxC;n++){
    const chip=document.createElement('button');chip.className='freq-count-chip'+(fc===n?' active':'');chip.textContent=n;
    chip.onclick=()=>{cr.querySelectorAll('.freq-count-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');};
    cr.appendChild(chip);
  }
  extra.appendChild(cr);
  if(ft==='weekly'){
    const dl=document.createElement('div');dl.className='day-label';dl.textContent='曜日指定（任意・複数OK）';extra.appendChild(dl);
    const dr=document.createElement('div');dr.className='day-chips-row';
    DAYS_JA.forEach((d,idx)=>{
      const chip=document.createElement('button');
      chip.className='day-chip'+(idx===0?' sun-chip':idx===6?' sat-chip':'')+(days.includes(idx)?' active':'');
      chip.textContent=d;chip.onclick=()=>chip.classList.toggle('active');dr.appendChild(chip);
    });
    extra.appendChild(dr);
  }
}

/* ===== EMOJI PICKER ===== */
function openEmojiPicker(btn,type){
  emojiTargetBtn=btn;emojiTargetType=type;
  const list=type==='avatar'?AVATAR_EMOJIS:CHORE_EMOJIS;
  const grid=document.getElementById('emojiGrid');grid.innerHTML='';
  list.forEach(e=>{const opt=document.createElement('button');opt.className='emoji-opt';opt.textContent=e;opt.onclick=()=>{emojiTargetBtn.textContent=e;closeEmojiPicker();};grid.appendChild(opt);});
  document.getElementById('emojiCustomInput').value='';
  document.getElementById('emojiPickerOverlay').classList.add('show');
}
function closeEmojiPicker(){document.getElementById('emojiPickerOverlay').classList.remove('show');emojiTargetBtn=null;}
function closeEmojiOutside(e){if(e.target===document.getElementById('emojiPickerOverlay'))closeEmojiPicker();}
function applyCustomEmoji(){const v=document.getElementById('emojiCustomInput').value.trim();if(v&&emojiTargetBtn){emojiTargetBtn.textContent=v;closeEmojiPicker();}}

/* ===== COLOR PICKER ===== */
function openColorPicker(memberIdx){
  colorTargetIdx=memberIdx;colorSelected=members[memberIdx].color;
  document.getElementById('colorPickerLabel').textContent=members[memberIdx].name||'メンバー';
  const palette=document.getElementById('colorPalette');palette.innerHTML='';
  COLOR_PALETTE.forEach(c=>{
    const sw=document.createElement('div');sw.className='color-swatch'+(c===colorSelected?' selected':'');sw.style.background=c;
    sw.onclick=()=>{palette.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');colorSelected=c;};
    palette.appendChild(sw);
  });
  document.getElementById('colorPickerModal').classList.add('show');
}
function applyColor(){
  if(colorTargetIdx!=null&&colorSelected){members[colorTargetIdx].color=colorSelected;renderSettings();}
  closeColorPicker();
}
function closeColorPicker(){document.getElementById('colorPickerModal').classList.remove('show');colorTargetIdx=null;colorSelected=null;}
function closeColorPickerOutside(e){if(e.target===document.getElementById('colorPickerModal'))closeColorPicker();}

function addMemberInput(){members.push({name:'',avatar:'🌸',color:'#e8789a'});renderSettings();setTimeout(()=>{const a=document.querySelectorAll('.member-input');a[a.length-1].focus();},50);}
function removeMember(i){members.splice(i,1);renderSettings();}
function addChoreInput(){chores.push({name:'',icon:'✨',freqType:'weekly',freqCount:1,days:[]});renderSettings();setTimeout(()=>{const a=document.querySelectorAll('.chore-name-input');a[a.length-1].focus();},50);}
function removeChore(i){chores.splice(i,1);renderSettings();}
function saveSettings(){
  const rows=document.querySelectorAll('.member-input-row');
  const newMembers=[];
  rows.forEach((row,i)=>{
    const name=row.querySelector('.member-input').value.trim();if(!name)return;
    const avatar=row.querySelector('.member-avatar-btn').textContent||'🌸';
    const color=members[i]?.color||'#e8789a';
    newMembers.push({name,avatar,color});
  });
  members=newMembers;
  chores=[];
  document.querySelectorAll('.chore-settings-row').forEach(row=>{
    const name=row.querySelector('.chore-name-input').value.trim();if(!name)return;
    const icon=row.querySelector('.chore-icon-btn').textContent||'✨';
    const at=row.querySelector('.freq-type-btn.active');
    const freqType=at?(at.textContent==='月'?'monthly':at.textContent==='週'?'weekly':'daily'):'weekly';
    const ac=row.querySelector('.freq-count-chip.active');const freqCount=ac?parseInt(ac.textContent):1;
    const days=[];row.querySelectorAll('.day-chip.active').forEach(chip=>{const idx=DAYS_JA.indexOf(chip.textContent);if(idx>=0)days.push(idx);});
    chores.push({name,icon,freqType,freqCount,days});
  });
  localStorage.setItem('oc_members2',JSON.stringify(members));
  localStorage.setItem('oc_chores',JSON.stringify(chores));
  renderSettings();document.getElementById('resultArea').classList.remove('visible');lastResult=null;showToast('✅ 設定を保存しました');
}

/* ===== NAV ===== */
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');btn.classList.add('active');
  if(page==='history')renderHistory();if(page==='settings')renderSettings();if(page==='home')renderUnavailCal();
}

/* ===== TOAST ===== */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

/* ===== UTIL ===== */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// CSS用 rgba文字列（hexAlpha）- HTML表示用のみ
function hexAlpha(hex,a){const h=(hex||'#888888').replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return`rgba(${r},${g},${b},${a})`;}
